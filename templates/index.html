<style>

    .about-link {
        position: absolute;

        right: 25px;

        padding: 10px 18px;
        border-radius: 6px;
        color: #fff;
        font-weight: 500;
        text-decoration: none;
        transition: 0.3s;
    }
    .about-link:hover {
        background: rgba(0, 0, 0, 0.8);
        color: #fff;
    }
</style>
