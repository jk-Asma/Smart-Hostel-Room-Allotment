<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Panel</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:linear-gradient(90deg,#6a11cb,#2575fc);color:#fff;display:flex;align-items:center;justify-content:center;height:100vh}.card{background:rgba(255,255,255,0.08);padding:30px;border-radius:12px;max-width:520px}.btn{margin-top:10px}.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}</style>
</head>
<body>
<div class="card">
  <div class="header-row">
    <h3>Admin Panel</h3>
    <div><a href="/logout" class="btn btn-danger">Logout</a></div>
  </div>
  <form action="/upload_csv" method="post" enctype="multipart/form-data">
    <input class="form-control mb-3" type="file" name="file" required>
    <button class="btn btn-primary w-100" type="submit">Upload & Assign Rooms</button>
  </form>
  <a href="/results" class="btn btn-success w-100">View Allotted Rooms</a>
  <a href="/download_assigned" class="btn btn-light w-100 mt-2">Download Assigned CSV</a>
</div>
</body>
</html>
