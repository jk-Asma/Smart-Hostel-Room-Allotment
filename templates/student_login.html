<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Student Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:linear-gradient(90deg,#11998e,#38ef7d);color:#fff;display:flex;align-items:center;justify-content:center;height:100vh}.card{background:rgba(255,255,255,0.08);padding:30px;border-radius:12px;max-width:420px}</style>
</head>
<body>
<div class="card text-center">
  <h3>Student Login</h3>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <form method="post" action="/student">
    <input class="form-control mb-3" name="roll" placeholder="Enter your roll number" required>
    <input class="form-control mb-3" name="password" type="password" placeholder="Password (default = roll number)" required>
    <button class="btn btn-success w-100" type="submit">View My Room</button>
  </form>
  <div class="mt-3"><a href="/">Back to Home</a></div>
</div>
</body>
</html>
