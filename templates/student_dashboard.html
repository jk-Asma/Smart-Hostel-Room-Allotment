<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Student Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:linear-gradient(120deg,#6a11cb,#2575fc);color:#fff;font-family:Arial,Helvetica,sans-serif}.card{max-width:560px;margin:60px auto;padding:30px;border-radius:12px;background:rgba(255,255,255,0.08);box-shadow:0 10px 30px rgba(0,0,0,0.2)}ul{list-style:none;padding:0}li{background:rgba(255,255,255,0.06);margin:8px 0;padding:10px;border-radius:8px}</style>
</head>
<body>
<div class="card text-center">
  <div style="text-align:right;margin-bottom:10px;"><a href="/logout" class="btn btn-sm btn-danger">Logout</a></div>
  <h2 id="studentName">{{ student_name }}</h2>
  <h4 class="mt-3">Room Number: <span class="badge bg-light text-dark">{{ room_number }}</span></h4>
  <hr>
  <h5 class="mt-3">Roommates</h5>
  {% if roommates and roommates|length > 0 %}
  <ul>
    {% for r in roommates %}<li>{{ r }}</li>{% endfor %}
  </ul>
  {% else %}<p>No roommates assigned (single occupant)</p>{% endif %}
</div>
</body>
</html>
