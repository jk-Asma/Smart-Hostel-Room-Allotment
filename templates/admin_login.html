<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:linear-gradient(90deg,#6a11cb,#2575fc);color:#fff;display:flex;align-items:center;justify-content:center;height:100vh}.card{background:rgba(255,255,255,0.08);padding:30px;border-radius:12px;max-width:420px}</style>
</head>
<body>
<div class="card text-center">
  <h3>Admin Login</h3>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <form method="post" action="/admin_login">
    <input class="form-control mb-3" name="username" placeholder="Username" required>
    <input class="form-control mb-3" name="password" type="password" placeholder="Password" required>
    <button class="btn btn-primary w-100" type="submit">Login</button>
  </form>
</div>
</body>
</html>
